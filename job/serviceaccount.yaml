# ServiceAccount avec IRSA (IAM Roles for Service Accounts) : donne au pod du
# CronJob le droit d'écrire dans le bucket S3, sans clé AWS statique.
#
# Créé via eksctl (génère automatiquement le rôle IAM + l'annotation) :
#   eksctl create iamserviceaccount \
#     --cluster worldcup-cluster --region eu-west-3 \
#     --namespace default --name worldcup-job-sa \
#     --attach-policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess \
#     --approve
#
# (en prod, remplacer AmazonS3FullAccess par une policy restreinte au bucket
# worldcup-cdm2026-rapports uniquement)

apiVersion: v1
kind: ServiceAccount
metadata:
  name: worldcup-job-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/worldcup-job-sa-role
